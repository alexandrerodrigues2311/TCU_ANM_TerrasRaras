        const score = prob * imp;

        if (score >= 12) return 'bg-amber-50 border-amber-200/60 shadow-[inset_0_0_10px_rgba(217,119,6,0.05)]';

        return 'bg-slate-50 border-slate-200/60';

                  <span className="material-symbols-outlined text-slate-300 text-5xl mb-3">search_off</span>
                  <h3 className="text-lg font-bold text-slate-700">Nenhum registo mapeado neste perfil</h3>
                  <p className="text-sm text-slate-500 mt-1">Experimente limpar os filtros aplicados na barra superior.</p>
                  <button onClick={() => { setFilterLevel('Todos'); setFilterOwner('Todas'); setFilterCategory('Todas'); }} className="mt-4 px-5 py-2.5 bg-slate-900 text-white rounded-lg font-semibold text-xs hover:bg-slate-800 transition-colors shadow-sm">Repor Visualização</button>
               </div>
            ) : viewMode === 'grid' ? (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                {filteredRisks.map((risk) => {
                  const primaryStyle = getOwnerStyle(risk.primaryOwner);
                  return (
                    <div 
                      key={risk.id} 
                      className="bg-white rounded-2xl border border-slate-200 card-shadow card-hover transition-all duration-300 flex flex-col relative overflow-hidden"
                    >
                      <div className={`absolute top-0 left-0 w-full h-1.5 ${primaryStyle.bg.replace('50', '400')}`}></div>

                      <div className="p-6">
                        <div className="flex justify-between items-start mb-5">
                          <div className="flex gap-4">
                            <div className={`w-12 h-12 rounded-xl ${getIconStyle(risk.level)} flex items-center justify-center shrink-0`}>
                              <span className="material-symbols-outlined text-[22px]">{risk.icon}</span>
                            </div>
                            <div>
                              <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                                <span className="text-[10px] font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded uppercase tracking-wider border border-slate-200">{risk.id}</span>
                                <span className={`px-1.5 py-0.5 text-[10px] font-bold rounded border uppercase tracking-wider ${getBadgeStyle(risk.level)}`}>
                                  {risk.level}
                                </span>
                              </div>
                              <h3 className="text-base font-bold text-slate-900 leading-snug">{risk.title}</h3>
                            </div>
                          </div>
                        </div>
                        
                        <div className="mb-5 flex flex-col gap-3">
                          <div className="flex gap-1.5 flex-wrap">
                            {risk.involvedUnits.map(unit => {
                              const unitStyle = getOwnerStyle(unit);
                              return (
                                <span key={unit} className={`text-[10px] font-bold px-2 py-0.5 rounded border ${unitStyle.tag} ${unitStyle.text} ${unitStyle.border}`} title={ownerLabels[unit]}>
                                  {unit}
                                </span>
                              );
                            })}
                          </div>
                          <span className="text-[10px] font-bold text-blue-600 bg-blue-50 px-2.5 py-1 rounded-md w-max border border-blue-100 uppercase tracking-widest line-clamp-1" title={risk.category}>
                            {risk.category}
                          </span>
                        </div>

                        <div className="flex items-center gap-2 text-[11px] font-bold text-slate-600 bg-slate-50/80 px-2.5 py-1.5 rounded-lg border border-slate-100 mb-5 w-fit">
                          <span title="Probabilidade" className="flex items-center gap-1"><span className="material-symbols-outlined text-[14px]">trending_up</span> P: {risk.prob}</span>
                          <span className="text-slate-300">|</span>
                          <span title="Impacto" className="flex items-center gap-1"><span className="material-symbols-outlined text-[14px]">warning</span> I: {risk.imp}</span>
                          <span className="text-slate-300">|</span>
                          <span className="text-slate-800 flex items-center gap-1"><span className="material-symbols-outlined text-[14px]">calculate</span> ESC: {risk.score}</span>
                        </div>
                        
                        <div className="space-y-4">
                          <div>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Cenário Mapeado</p>
                            <p className="text-sm text-slate-700 leading-relaxed font-medium">{risk.cenario}</p>
                          </div>
                          <div className="grid grid-cols-1 xl:grid-cols-2 gap-3">
                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                              <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-1.5"><span className="material-symbols-outlined text-[16px]">analytics</span> Avaliação da Probabilidade</p>
                              <p className="text-xs text-slate-600 leading-relaxed">{risk.probJustificativa}</p>
                            </div>
                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                              <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-1.5"><span className="material-symbols-outlined text-[16px]">target</span> Desdobramento do Impacto</p>
                              <p className="text-xs text-slate-600 leading-relaxed">{risk.impactoJustificativa}</p>
                            </div>
                          </div>
                        </div>
                      </div>

                      <div className="bg-slate-50/80 p-5 border-t border-slate-100 mt-auto">
                        <p className="text-[10px] font-bold text-slate-800 uppercase tracking-widest mb-1.5 flex items-center gap-1.5">
                          <span className="material-symbols-outlined text-blue-600 text-[18px]">task_alt</span> Mitigação
                        </p>
                        <p className="text-sm text-slate-800 leading-relaxed font-semibold">{risk.diretrizes}</p>
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : (
              <div className="bg-white rounded-2xl card-shadow border border-slate-200 overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse min-w-[1100px]">
                    <thead>
                      <tr className="bg-slate-900 border-b border-slate-800">
                        <th className="px-5 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest w-16">ID</th>
                        <th className="px-5 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest w-40">Superintendências</th>
                        <th className="px-5 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest w-64">Risco / Cenário</th>
                        <th className="px-5 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center w-28">Métricas</th>
                        <th className="px-5 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest min-w-[350px]">Fundamentação e Determinações</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {filteredRisks.map((risk) => {
                        return (
                          <tr key={risk.id} className="hover:bg-slate-50/50 transition-colors group">
                            <td className="px-5 py-5 align-top">
                              <span className="text-xs font-bold text-slate-600 bg-slate-100 px-2 py-1 rounded border border-slate-200">{risk.id}</span>
                            </td>
                            <td className="px-5 py-5 align-top">
                              <div className="flex flex-wrap gap-1">
                                {risk.involvedUnits.map(unit => {
                                  const uStyle = getOwnerStyle(unit);
                                  return (
                                    <span key={unit} className={`inline-block px-1.5 py-0.5 text-[9px] font-bold rounded border text-center ${uStyle.tag} ${uStyle.text} ${uStyle.border}`}>
                                      {unit}
                                    </span>
                                  );
                                })}
                              </div>
                            </td>
                            <td className="px-5 py-5 align-top">
                              <div className="text-sm font-bold text-slate-900 mb-1.5 leading-snug">{risk.title}</div>
                              <div className="text-[9px] font-bold text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded border border-blue-100 uppercase tracking-widest mb-2 inline-block">{risk.category}</div>
                              <div className="text-xs text-slate-600 leading-relaxed font-medium">{risk.cenario}</div>
                            </td>
                            <td className="px-5 py-5 align-top">
                              <div className="flex flex-col items-center gap-1.5">
                                <span className={`inline-flex px-2 py-0.5 text-[10px] font-bold rounded border uppercase tracking-wider ${getBadgeStyle(risk.level)}`}>
                                  {risk.level}
                                </span>
                                <span className="text-[11px] font-semibold text-slate-500">
                                  P: {risk.prob} × I: {risk.imp} <br/> <strong>ESC: {risk.score}</strong>
                                </span>
                              </div>
                            </td>
                            <td className="px-5 py-5 align-top space-y-3">
                              <div className="grid grid-cols-2 gap-4 bg-slate-50 p-3 rounded-lg border border-slate-100">
                                <div>
                                  <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Probabilidade:</span>
                                  <p className="text-[11px] text-slate-600 leading-relaxed">{risk.probJustificativa}</p>
                                </div>
                                <div>
                                  <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Impacto:</span>
                                  <p className="text-[11px] text-slate-600 leading-relaxed">{risk.impactoJustificativa}</p>
                                </div>
                              </div>
                              <div className="pt-1">
                                <span className="text-[10px] font-bold text-blue-600 uppercase tracking-widest block mb-1">Mitigação:</span>
                                <p className="text-xs text-slate-800 leading-relaxed font-semibold">{risk.diretrizes}</p>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div className="bg-slate-50 p-3 border-t border-slate-200 text-[10px] text-slate-500 font-semibold text-center tracking-widest uppercase">
                  A apresentar {filteredRisks.length} de {risksData.length} registos avaliados.
                </div>
              </div>
            )}

          </main>

          {/* Rodapé Executivo */}
          <footer className="mt-10 border-t border-slate-200 bg-white">
            <div className="max-w-[90rem] mx-auto px-6 py-12">
              <div className="bg-slate-900 rounded-2xl p-10 border border-slate-800 flex flex-col md:flex-row gap-8 items-start shadow-xl relative overflow-hidden">
                <div className="absolute -right-32 -top-32 w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-3xl pointer-events-none"></div>
                
                <div className="bg-slate-800 p-5 rounded-xl border border-slate-700 shrink-0 z-10">
                  <span className="material-symbols-outlined text-white text-4xl">account_balance</span>
                </div>
                <div className="relative z-10">
                  <h4 className="text-sm font-black tracking-widest text-blue-400 uppercase mb-4">Nota</h4>
                  <p className="text-lg text-slate-300 leading-relaxed font-medium mb-6">
                    A arquitetura regimental da Agência repudia o insulamento técnico. A superação e mitigação destes vetores de risco implicam a interdependência compulsória entre as Superintendências destacadas em cada quadrante. Requer-se celeridade na modernização de ferramentas, supressão de assimetrias de informação ao longo de toda a cadeia produtiva de minerais críticos e o blindar do erário público contra subavaliações ou perdas de arrecadação.
                  </p>
                  <div className="flex items-center gap-4">
                    <div className="w-14 h-14 rounded-full bg-gradient-to-tr from-blue-700 to-slate-600 flex items-center justify-center text-white font-black text-sm shadow-inner border border-slate-500">
                      ANM
                    </div>
                    <div>
                      <p className="text-lg font-bold text-white tracking-wide">Agência Nacional de Mineração</p>
                      <p className="text-sm text-slate-400 font-medium tracking-wide">Promovendo o uso racional e o acesso aos recursos minerais no Brasil, gerando riqueza e bem-estar social</p>
                    </div>
                  </div>
                </div>
              </div>
              
              <div className="mt-10 flex flex-col md:flex-row justify-between items-center gap-4 text-xs font-bold text-slate-400 uppercase tracking-widest">
                <span>&copy; {new Date().getFullYear()} Governo Federal • Agência Nacional de Mineração.</span>
                <span>Documento em Preparação</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
